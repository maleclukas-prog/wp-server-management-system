name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Print CI revision and test suite fingerprint
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          git rev-parse HEAD
          wc -l tests/test_suite.sh
          grep -n "MAIL_CONFIGURATION\|ALERT_EMAIL\|\[15\]|Total:" tests/test_suite.sh || true

      - name: Run repository test suite
        run: bash tests/test_suite.sh

      - name: Build Docker smoke image
        run: docker build -t wsms-smoke-test -f tests/docker/Dockerfile .

      - name: Run installer smoke test
        run: docker run --rm wsms-smoke-test